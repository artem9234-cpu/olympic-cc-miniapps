<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>🎡 Рулетка лучших — КЦ Олимпийский</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --tg-safe-area-inset-top: 0px;
      --tg-safe-area-inset-bottom: 0px;
      --wheel-size: min(85vw, 320px);
      --bulb-size: 16px;
    }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: white;
      min-height: 100dvh;
      padding-top: var(--tg-safe-area-inset-top);
      padding-bottom: var(--tg-safe-area-inset-bottom);
      overflow-x: hidden;
      position: relative;
    }

    /* Сверкающие звёзды */
    .stars {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--dur, 4s) infinite ease-in-out;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    /* === ОСНОВНОЙ КОНТЕЙНЕР === */
    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 500px;
      padding: 15px 15px calc(var(--tg-safe-area-inset-bottom, 15px) + 15px);
      margin-top: calc(var(--tg-safe-area-inset-top, 5px) + 5px);
      margin-inline: auto;
      display: flex;
      flex-direction: column;
      min-height: calc(100dvh - var(--tg-safe-area-inset-top, 0px) - var(--tg-safe-area-inset-bottom, 0px));
    }

    .header h1 {
      font-size: clamp(1.4em, 6vw, 1.8em);
      font-weight: 800;
      letter-spacing: 0.5px;
      text-shadow: 0 0 10px rgba(255,215,0,0.6), 0 0 20px rgba(255,215,0,0.4);
      color: #ffd700;
      margin: 8px 0;
      text-align: center;
      line-height: 1.2;
    }

    .subtitle {
      font-size: clamp(0.9em, 4vw, 1em);
      opacity: 0.7;
      margin-top: 3px;
      color: #e0e0ff;
      text-align: center;
      line-height: 1.2;
    }

    /* === СТРЕЛКА-УКАЗАТЕЛЬ === */
    .pointer-container {
      position: relative;
      width: var(--wheel-size);
      height: 50px;
      margin: 0 auto 5px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
    }

    .pointer {
      width: 0;
      height: 0;
      border-left: 25px solid transparent;
      border-right: 25px solid transparent;
      border-top: 45px solid #ffd700;
      filter: drop-shadow(0 0 10px rgba(255,215,0,0.8)) drop-shadow(0 4px 8px rgba(0,0,0,0.5));
      z-index: 30;
      animation: pointerBounce 0.6s ease-in-out infinite;
      animation-play-state: paused;
    }

    .pointer.spinning {
      animation-play-state: running;
    }

    @keyframes pointerBounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-8px) scale(1.1); }
    }

    /* === РУЛЕТКА С ЛАМПОЧКАМИ === */
    .wheel-wrapper {
      position: relative;
      width: var(--wheel-size);
      height: var(--wheel-size);
      margin: 0 auto 20px;
    }

    /* Кольцо с лампочками */
    .bulb-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      z-index: 15;
      pointer-events: none;
    }

    .bulb {
      position: absolute;
      width: var(--bulb-size);
      height: var(--bulb-size);
      background: radial-gradient(circle at 30% 30%, #fff, #ffd700, #ff8c00);
      border-radius: 50%;
      box-shadow: 
        0 0 10px #ffd700,
        0 0 20px #ffd700,
        0 0 30px rgba(255,215,0,0.5),
        inset -2px -2px 4px rgba(0,0,0,0.3);
      animation: bulbFlash 1s ease-in-out infinite;
    }

    .bulb:nth-child(odd) { animation-delay: 0s; }
    .bulb:nth-child(even) { animation-delay: 0.5s; }

    .bulb.spinning {
      animation: bulbFlash 0.3s ease-in-out infinite;
    }

    @keyframes bulbFlash {
      0%, 100% { 
        opacity: 1; 
        transform: scale(1);
        box-shadow: 0 0 15px #ffd700, 0 0 30px #ffd700, 0 0 45px rgba(255,215,0,0.6);
      }
      50% { 
        opacity: 0.6; 
        transform: scale(0.9);
        box-shadow: 0 0 5px #ff8c00, 0 0 10px #ff8c00;
      }
    }

    /* Само колесо */
    .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: conic-gradient(
        #ff5252 0deg,
        #ff9a00 72deg,
        #00c853 144deg,
        #2962ff 216deg,
        #aa00ff 288deg,
        #ff5252 360deg
      );
      box-shadow:
        0 0 30px rgba(255, 255, 255, 0.3),
        inset 0 0 40px rgba(0,0,0,0.6),
        0 0 60px rgba(255,215,0,0.2);
      position: relative;
      border: 8px solid #2a2a4a;
    }

    /* Внутренний круг */
    .wheel::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 35%; height: 35%;
      background: radial-gradient(circle at 30% 30%, #4a4a6a, #1a1a2e);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
      border: 4px solid #ffd700;
      box-shadow: 0 0 20px rgba(255,215,0,0.4);
    }

    /* Центральная точка */
    .center-dot {
      position: absolute;
      top: 50%; left: 50%;
      width: 16px; height: 16px;
      background: radial-gradient(circle at 30% 30%, #fff, #ffd700);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      box-shadow: 
        0 0 15px #ffd700,
        0 0 30px #ffd700,
        0 0 45px rgba(255,215,0,0.6);
    }

    /* Декоративные спицы */
    .spoke {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 4px;
      height: 45%;
      background: linear-gradient(to bottom, rgba(255,215,0,0.6), transparent);
      transform-origin: top center;
      z-index: 6;
    }

    /* === КНОПКА === */
    .button {
      background: linear-gradient(135deg, #ffd700, #ff9800);
      color: #222;
      border: none;
      padding: clamp(14px, 4vw, 16px) clamp(30px, 10vw, 40px);
      font-size: clamp(1.1em, 4.5vw, 1.3em);
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow:
        0 6px 20px rgba(255, 215, 0, 0.5),
        0 0 0 4px rgba(255, 215, 0, 0.1);
      z-index: 10;
      position: relative;
      display: block;
      margin: 15px auto;
      width: fit-content;
      min-width: 180px;
    }
    .button:hover:not(:disabled) {
      transform: scale(1.05) translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 215, 0, 0.7), 0 0 0 6px rgba(255, 215, 0, 0.2);
    }
    .button:active {
      transform: scale(0.98) translateY(1px);
    }
    .button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* === БЛОК РЕЗУЛЬТАТОВ === */
    .result {
      margin: 20px auto 0;
      background: rgba(255, 255, 255, 0.07);
      border-radius: 16px;
      padding: clamp(15px, 4vw, 20px);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: none;
      max-height: min(40vh, 320px);
      overflow-y: auto;
      width: calc(100% - 30px);
      flex: 1;
      min-height: 0;
    }
    .result-title {
      font-size: clamp(1.2em, 5vw, 1.4em);
      margin-bottom: 12px;
      color: #ffd700;
      text-shadow: 0 0 8px rgba(255,215,0,0.4);
      text-align: center;
      line-height: 1.2;
    }
    .employee {
      background: rgba(255, 255, 255, 0.08);
      margin: 10px 0;
      padding: clamp(12px, 3vw, 14px);
      border-radius: 12px;
      text-align: left;
      border-left: 3px solid #ffd700;
      font-size: clamp(0.85em, 3.5vw, 1em);
      line-height: 1.3;
    }
    .employee-name {
      font-weight: bold;
      font-size: clamp(1em, 4vw, 1.15em);
      color: #fff;
      margin-bottom: 4px;
    }
    .medal { 
      font-size: clamp(1.1em, 4vw, 1.3em); 
      margin-right: 6px; 
    }

    /* === АДАПТИВНОСТЬ === */
    @media (max-height: 700px) {
      .wheel-wrapper {
        width: calc(var(--wheel-size) * 0.9);
        height: calc(var(--wheel-size) * 0.9);
      }
      .pointer-container {
        width: calc(var(--wheel-size) * 0.9);
      }
      :root { --bulb-size: 14px; }
    }

    @media (max-height: 600px) {
      .wheel-wrapper {
        width: calc(var(--wheel-size) * 0.8);
        height: calc(var(--wheel-size) * 0.8);
      }
      .pointer-container {
        width: calc(var(--wheel-size) * 0.8);
      }
      :root { --bulb-size: 12px; }
    }

    .result::-webkit-scrollbar { width: 4px; }
    .result::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 2px; }
    .result::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.5); border-radius: 2px; }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>

  <div class="container" id="mainContainer">
    <div class="header">
      <h1>Контактный центр Олимпийский</h1>
      <div class="subtitle">🎡 Рулетка лучших сотрудников</div>
    </div>

    <!-- Стрелка -->
    <div class="pointer-container">
      <div class="pointer" id="pointer"></div>
    </div>

    <!-- Рулетка с лампочками -->
    <div class="wheel-wrapper">
      <div class="bulb-ring" id="bulbRing"></div>
      <div class="wheel" id="wheel"></div>
      <div class="center-dot"></div>
    </div>

    <button class="button" id="spinBtn">🎯 Крутить</button>

    <div class="result" id="result">
      <div class="result-title">🎊 Результаты:</div>
      <div id="employeesList"></div>
    </div>
  </div>

  <script>
    // === ЗВЁЗДЫ ===
    function createStars() {
      const el = document.getElementById('stars');
      const starCount = window.innerHeight < 600 ? 50 : 80;
      for (let i = 0; i < starCount; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const size = Math.random() * 2 + 1;
        s.style.width = `${size}px`;
        s.style.height = `${size}px`;
        s.style.left = `${Math.random() * 100}%`;
        s.style.top = `${Math.random() * 100}%`;
        s.style.setProperty('--dur', `${2 + Math.random() * 5}s`);
        s.style.animationDelay = `${Math.random() * 5}s`;
        el.appendChild(s);
      }
    }

    // === ЛАМПОЧКИ ПО КРУГУ ===
    function createBulbs() {
      const ring = document.getElementById('bulbRing');
      const bulbCount = 24; // Количество лампочек
      const radius = 50; // Процент от размера колеса
      
      for (let i = 0; i < bulbCount; i++) {
        const bulb = document.createElement('div');
        bulb.className = 'bulb';
        const angle = (i * 360 / bulbCount) * (Math.PI / 180);
        const x = 50 + radius * Math.cos(angle) - 8; // -8 это половина размера лампочки
        const y = 50 + radius * Math.sin(angle) - 8;
        bulb.style.left = `${x}%`;
        bulb.style.top = `${y}%`;
        ring.appendChild(bulb);
      }
    }

    // === СПИЦЫ ===
    function createSpokes() {
      const wheel = document.getElementById('wheel');
      const spokeCount = 5;
      for (let i = 0; i < spokeCount; i++) {
        const spoke = document.createElement('div');
        spoke.className = 'spoke';
        spoke.style.transform = `rotate(${i * 360 / spokeCount}deg)`;
        wheel.appendChild(spoke);
      }
    }

    // === АУДИО ===
    const spinAudio = new Audio('assets/spin.mp3');
    const winAudio = new Audio('assets/win.mp3');
    spinAudio.preload = 'auto';
    winAudio.preload = 'auto';

    // === РАЗБЛОКИРОВКА АУДИО ===
    let audioUnlocked = false;
    function unlockAudio() {
      if (audioUnlocked) return;
      try {
        spinAudio.play().catch(() => {});
        winAudio.play().catch(() => {});
        spinAudio.pause();
        winAudio.pause();
        audioUnlocked = true;
      } catch (e) { console.warn('🔇 Audio unlock:', e); }
    }

    // === ЭЛЕМЕНТЫ ===
    const wheel = document.getElementById('wheel');
    const pointer = document.getElementById('pointer');
    const spinBtn = document.getElementById('spinBtn');
    const resultDiv = document.getElementById('result');
    const employeesList = document.getElementById('employeesList');
    const container = document.getElementById('mainContainer');
    const bulbs = document.querySelectorAll('.bulb');

    // === API ===
    const API_URL = 'https://script.google.com/macros/s/AKfycbwzUQpPcs8gEv5x6MKJpeeANRD8S7m9OhRr-SkD4SHGB1vLuOMAJa0IRxx0X2XaYIEfDg/exec';
    const FALLBACK_URL = 'https://artem9234-cpu.github.io/olympic-cc-miniapps/fallback.json?_=' + Date.now();

    // === АДАПТАЦИЯ ===
    function adjustLayout() {
      if (window.Telegram?.WebApp) {
        const tg = Telegram.WebApp;
        const top = tg.safeArea?.top || 0;
        const bottom = tg.safeArea?.bottom || 0;
        document.documentElement.style.setProperty('--tg-safe-area-inset-top', `${top}px`);
        document.documentElement.style.setProperty('--tg-safe-area-inset-bottom', `${bottom}px`);
        if (container) {
          const usableHeight = tg.viewportHeight - top - bottom;
          container.style.minHeight = `${usableHeight}px`;
        }
      }
    }

    // === КРУЧЕНИЕ ===
    async function spin() {
      unlockAudio();

      spinBtn.disabled = true;
      spinBtn.textContent = 'Крутим...';
      resultDiv.style.display = 'none';

      // Запускаем анимации
      pointer.classList.add('spinning');
      bulbs.forEach(bulb => bulb.classList.add('spinning'));

      try {
        spinAudio.currentTime = 0;
        spinAudio.play();
      } catch (e) { console.warn('🔇 spinAudio:', e); }

      const rotations = 8 + Math.floor(Math.random() * 5);
      const sector = Math.floor(Math.random() * 5) * 72;
      const finalDeg = 360 * rotations + sector;
      const spinDuration = 12000 + Math.random() * 6000;

      wheel.style.transition = `transform ${spinDuration / 1000}s cubic-bezier(0.17, 0.67, 0.14, 0.98)`;
      wheel.style.transform = `rotate(${finalDeg}deg)`;

      let data = null;
      let isFallback = false;

      try {
        const res = await fetch(API_URL, { headers: { 'Accept': 'application/json' } });
        const txt = await res.text();
        
        if (txt.includes('<html') || txt.includes('NTA') || txt.includes('नेपाल') || !res.ok) {
          throw new Error('blocked');
        }
        
        data = JSON.parse(txt);
        if (!data?.success) throw new Error('API error');
        
      } catch (err) {
        isFallback = true;
        try {
          const fallbackRes = await fetch(FALLBACK_URL);
          data = await fallbackRes.json();
          if (!data.success) throw new Error('Fallback error');
        } catch (fallbackErr) {
          data = { success: false, error: 'Не удалось загрузить данные. Попробуйте ещё раз.' };
        }
      }

      await new Promise(r => setTimeout(r, spinDuration + 200));

      // Останавливаем анимации
      pointer.classList.remove('spinning');
      bulbs.forEach(bulb => bulb.classList.remove('spinning'));

      try { spinAudio.pause(); } catch {}
      try {
        winAudio.currentTime = 0;
        winAudio.play();
      } catch (e) { console.warn('🔇 winAudio:', e); }

      if (data.success) {
        displayResults(data.data, isFallback);
      } else {
        displayError(data.error);
      }

      spinBtn.disabled = false;
      spinBtn.textContent = '🎯 Крутить';
    }

    // === РЕЗУЛЬТАТ ===
    function displayResults(employees, isFallback = false) {
      employeesList.innerHTML = '';
      const medals = ['🥇', '🥈', '🥉', '🎖️', '🏅'];
      employees.slice(0, 5).forEach((emp, i) => {
        const div = document.createElement('div');
        div.className = 'employee';
        div.innerHTML = `
          <div class="employee-name"><span class="medal">${medals[i] || '👤'}</span>${emp.name || '—'}</div>
          📞 Звонки: ${emp.calls || '–'}<br>
          ⏱ AHT: ${emp.aht || '–'}<br>
          ❌ Пропущенные: ${emp.missed || '–'}<br>
          ✅ Качество: ${emp.quality || '–'}
        `;
        employeesList.appendChild(div);
      });
      resultDiv.style.display = 'block';
      
      setTimeout(() => {
        resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 100);
    }

    // === ОШИБКА ===
    function displayError(message) {
      employeesList.innerHTML = `
        <div class="employee">
          <div style="text-align: center; color: #ff6b6b;">
            <div style="font-size: 2em; margin-bottom: 10px;">⚠️</div>
            <div>${message}</div>
            <div style="margin-top: 10px; font-size: 0.9em; opacity: 0.7;">Попробуйте ещё раз</div>
          </div>
        </div>
      `;
      resultDiv.style.display = 'block';
    }

    // === ЗАПУСК ===
    document.addEventListener('DOMContentLoaded', () => {
      createStars();
      createBulbs();
      createSpokes();
      spinBtn.addEventListener('click', spin);

      if (window.Telegram?.WebApp) {
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
        Telegram.WebApp.setHeaderColor('#0f0c29');
        Telegram.WebApp.setBackgroundColor('#0f0c29');
        Telegram.WebApp.onEvent('viewportChanged', adjustLayout);
        adjustLayout();
      } else {
        window.addEventListener('resize', adjustLayout);
        adjustLayout();
      }
    });
  </script>
</body>
</html>
